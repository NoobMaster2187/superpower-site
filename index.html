<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rastgele Süper Güç</title>

<style>
body{
    margin:0;
    min-height:100vh;
    background:radial-gradient(circle at top, #243b55, #141e30 60%, #050505);
    color:white;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.container{
    width:90%;
    max-width:500px;
    background:rgba(0,0,0,0.55);
    padding:30px;
    border-radius:25px;
    box-shadow:0 0 30px rgba(0,200,255,0.35);
    border:1px solid rgba(255,255,255,0.15);
}

h1{
    font-size:32px;
    margin-bottom:10px;
}

.desc{
    color:#ccc;
    margin-bottom:25px;
}

button{
    padding:16px 30px;
    font-size:20px;
    border:none;
    border-radius:15px;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    color:white;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.07);
    box-shadow:0 0 20px #00c6ff;
}

#sonuc{
    margin-top:30px;
    text-align:left;
    background:rgba(255,255,255,0.08);
    padding:22px;
    border-radius:18px;
    display:none;
    animation:fadeIn 0.6s ease;
}

.guc-adi{
    text-align:center;
    font-size:27px;
    color:#00ffcc;
    margin-bottom:15px;
}

.info{
    margin:12px 0;
    line-height:1.5;
}

.label{
    color:#00c6ff;
    font-weight:bold;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
    <h1>Rastgele Süper Güç</h1>
    <p class="desc">Butona bas ve sana hangi gücün verildiğini öğren.</p>

    <button onclick="gucVer()">Gücümü Ver</button>

    <div id="sonuc"></div>
</div>

<script>
const gucler = [
    {
        isim:"⚡ Yıldırım Kontrolü",
        seviye:"Şehir İçi Savaş Seviyesi",
        aciklama:"Kullanıcı elektrik üretebilir, yönlendirebilir ve bedenini yüksek voltaja karşı dayanıklı hale getirebilir.",
        kapasite:"Birden fazla hedefe yıldırım gönderebilir, elektronik sistemleri bozabilir ve kısa süreli elektrik patlamaları oluşturabilir.",
        limit:"Büyük fırtınalar yaratamaz. Aşırı kullanım kas spazmı ve yorgunluk oluşturur."
    },
    {
        isim:"🔥 Ateş Manipülasyonu",
        seviye:"Bina Seviyesi",
        aciklama:"Kullanıcı ellerinden alev çıkarabilir, çevredeki ateşi kontrol edebilir ve saldırılarını patlayıcı hale getirebilir.",
        kapasite:"Yakın ve orta mesafede çok etkilidir. Kapalı alanları hızla yakabilir ve savunma amaçlı ateş duvarı oluşturabilir.",
        limit:"Oksijensiz ortamda zayıflar. Su ve yoğun soğuk gücü baskılayabilir."
    },
    {
        isim:"🌪️ Rüzgar Manipülasyonu",
        seviye:"Mahalle Seviyesi",
        aciklama:"Kullanıcı hava akımlarını kontrol ederek keskin rüzgar darbeleri, savunma bariyerleri ve yüksek hızlı hareket kabiliyeti kazanır.",
        kapasite:"Rakipleri uzaklaştırabilir, mermilerin yönünü bozabilir ve kısa süreli süzülme/uçuş sağlayabilir.",
        limit:"Kapalı ve dar alanlarda gücü düşer. Çok büyük kasırgalar oluşturamaz."
    },
    {
        isim:"❄️ Buz Gücü",
        seviye:"Bina - Mahalle Seviyesi",
        aciklama:"Kullanıcı buz oluşturabilir, zemini dondurabilir ve düşman hareketlerini kısıtlayabilir.",
        kapasite:"Buzdan silahlar, duvarlar ve tuzaklar yapabilir. Rakipleri yavaşlatmada çok başarılıdır.",
        limit:"Çok sıcak ortamlarda dayanıklılığı azalır. Sürekli buz üretimi enerji tüketir."
    },
    {
        isim:"🌀 Işınlanma",
        seviye:"Taktiksel Üstünlük Seviyesi",
        aciklama:"Kullanıcı kısa mesafelerde anlık yer değiştirebilir. Saldırıdan kaçmak ve rakibin arkasına geçmek için idealdir.",
        kapasite:"Görüş alanındaki noktalara ışınlanabilir. Savaşta yakalanması çok zordur.",
        limit:"Görmediği yerlere ışınlanamaz. Art arda kullanım baş dönmesi yapar."
    },
    {
        isim:"👁️ Zihin Okuma",
        seviye:"Stratejik Seviye",
        aciklama:"Kullanıcı yakınındaki insanların yüzeysel düşüncelerini okuyabilir ve niyetlerini anlayabilir.",
        kapasite:"Yalanları fark edebilir, rakibin saldırı planını önceden sezebilir ve sorgulamada avantaj sağlar.",
        limit:"Güçlü iradeli kişiler direnebilir. Aynı anda çok fazla zihin okumak kullanıcıyı yorar."
    },
    {
        isim:"💪 Süper Fiziksel Güç",
        seviye:"Bina Seviyesi",
        aciklama:"Kullanıcı insanüstü kas gücü, dayanıklılık ve refleks kazanır.",
        kapasite:"Beton duvarları kırabilir, araçları kaldırabilir ve yakın dövüşte ağır üstünlük kurabilir.",
        limit:"Menzilli saldırılara karşı avantaj sağlamaz. Zihinsel veya enerji tabanlı güçlere karşı zayıf kalabilir."
    },
    {
        isim:"🌊 Su Manipülasyonu",
        seviye:"Mahalle Seviyesi",
        aciklama:"Kullanıcı çevredeki suyu kontrol edebilir, basınçlı su saldırıları yapabilir ve savunma kalkanları oluşturabilir.",
        kapasite:"Su bulunan ortamlarda çok güçlenir. Rakibi bağlayabilir, itebilir veya boğulma tehlikesi yaratabilir.",
        limit:"Susuz ortamlarda gücü ciddi şekilde azalır."
    },
    {
        isim:"☠️ Gölge Gücü",
        seviye:"Suikast / Gizlilik Seviyesi",
        aciklama:"Kullanıcı gölgeler arasında hareket edebilir, karanlık alanlarda güçlenir ve düşmanın görüşünü bozabilir.",
        kapasite:"Kısa mesafeli gölge geçişleri yapabilir, karanlık zincirler oluşturabilir ve gizli saldırılarda çok etkilidir.",
        limit:"Parlak ışık altında zayıflar. Açık gündüz alanlarında gücü sınırlanır."
    },
    {
        isim:"🐉 Ejderha Formu",
        seviye:"Küçük Kasaba Seviyesi",
        aciklama:"Kullanıcı yarı-ejderha formuna dönüşerek büyük fiziksel güç, sert deri, kanat ve enerji nefesi kazanır.",
        kapasite:"Uçabilir, ağır darbeler alabilir ve geniş alanlı enerji saldırıları yapabilir.",
        limit:"Dönüşüm uzun süre korunamaz. Form bittikten sonra kullanıcı ciddi şekilde yorulur."
    }
];

function gucVer(){
    const guc = gucler[Math.floor(Math.random() * gucler.length)];
    const sonuc = document.getElementById("sonuc");

    sonuc.style.display = "block";
    sonuc.innerHTML = `
        <div class="guc-adi">${guc.isim}</div>
        <div class="info"><span class="label">Seviye:</span> ${guc.seviye}</div>
        <div class="info"><span class="label">Açıklama:</span> ${guc.aciklama}</div>
        <div class="info"><span class="label">Kullanım Kapasitesi:</span> ${guc.kapasite}</div>
        <div class="info"><span class="label">Limit:</span> ${guc.limit}</div>
    `;
}
</script>

</body>
</html>
