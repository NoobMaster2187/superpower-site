<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rastgele Süper Güç</title>

<style>
body{
    margin:0;
    min-height:100vh;
    background:radial-gradient(circle at top, #ffd700, #b8860b 60%, #1a1200);
    color:white;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.container{
    width:90%;
    max-width:500px;
    background:rgba(0,0,0,0.55);
    padding:30px;
    border-radius:25px;
    box-shadow:0 0 30px rgba(0,200,255,0.35);
    border:1px solid rgba(255,255,255,0.15);
}

h1{
    font-size:32px;
    margin-bottom:10px;
}

.desc{
    color:#ccc;
    margin-bottom:25px;
}

button{
    padding:16px 30px;
    font-size:20px;
    border:none;
    border-radius:15px;
    background:linear-gradient(135deg,#ff3c3c,#8b0000);
    color:white;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.07);
    box-shadow:0 0 20px #00c6ff;
}

#sonuc{
    margin-top:30px;
    text-align:left;
    background:rgba(255,255,255,0.08);
    padding:22px;
    border-radius:18px;
    display:none;
    animation:fadeIn 0.6s ease;
}

.guc-resim{
    width:100%;
    border-radius:15px;
    margin-bottom:20px;
    max-height:250px;
    object-fit:cover;
}

.guc-adi{
    text-align:center;
    font-size:27px;
    color:#00ffcc;
    margin-bottom:15px;
}

.info{
    margin:12px 0;
    line-height:1.5;
}

.label{
    color:#00c6ff;
    font-weight:bold;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
    <h1>Rastgele Süper Güç</h1>
    <p class="desc">Butona bas ve sana hangi gücün verildiğini öğren.</p>

    <button onclick="gucVer()">Gücümü Ver</button>

    <div id="sonuc"></div>
</div>

<script>
const gucler = [
  {
    isim:"🔥 Alev Hükümdarlığı",
    seviye:"Mahalle Seviyesi",
    aciklama:"Kullanıcı kendi alevini üretebilir, yönlendirebilir ve bedenini yüksek ısıya dayanıklı hale getirebilir.",
    limit:"Maksimum gücüyle yaklaşık bir mahalleyi yok edebilecek kadar ısı ve patlama gücü çıkarabilir. Şehir çapında yangın felaketi yaratamaz.",
    resim:"https://s13.gifyu.com/images/bIqCa.png"
  },
  {
    isim:"⚡ Fırtına Yıldırımı",
    seviye:"Şehir İçi Savaş Seviyesi",
    aciklama:"Kullanıcı elektrik üretebilir, yıldırım darbeleri indirebilir ve elektronik sistemleri bozabilir.",
    limit:"En fazla birkaç binayı aynı anda kullanılamaz hale getirecek elektrik gücü çıkarabilir. Tüm şehri karartacak seviyeye ulaşamaz.",
    resim:"https://s13.gifyu.com/images/bIqFW.png"
  },
  {
    isim:"🌪️ Kasırga Nefesi",
    seviye:"Mahalle Seviyesi",
    aciklama:"Kullanıcı güçlü rüzgar akımları oluşturabilir, keskin hava darbeleri ve savunma bariyerleri yaratabilir.",
    limit:"Maksimumda birkaç sokak genişliğinde yıkıcı rüzgar oluşturabilir. Gerçek bir şehir çapı kasırga yaratamaz.",
    resim:"https://s13.gifyu.com/images/bIqFD.png"
  },
  {
    isim:"🌊 Derin Deniz Kontrolü",
    seviye:"Mahalle Seviyesi",
    aciklama:"Kullanıcı çevredeki suyu kontrol edebilir, basınçlı su saldırıları ve su kalkanları oluşturabilir.",
    limit:"En fazla küçük bir mahalleyi su altında bırakabilecek kadar suyu kontrol edebilir. Denizleri veya okyanusları kontrol edemez.",
    resim:"https://s13.gifyu.com/images/bIqUS.png"
  },
  {
    isim:"❄️ Mutlak Buz Alanı",
    seviye:"Bina - Mahalle Seviyesi",
    aciklama:"Kullanıcı buz üretebilir, zemini dondurabilir ve düşmanlarını buzla kısıtlayabilir.",
    limit:"Maksimumda birkaç binayı ve çevresindeki sokakları dondurabilir. Bütün bir şehri buzul çağına çeviremez.",
    resim:"https://s13.gifyu.com/images/bIqU7.png"
  },
  {
    isim:"🌌 Yerçekimi Baskısı",
    seviye:"Şehir Seviyesi",
    aciklama:"Kullanıcı belirli alanlarda yerçekimini artırabilir, azaltabilir veya hedefleri yere sabitleyebilir.",
    limit:"En fazla birkaç kilometrelik alanı etkileyebilir. Bir ülke veya gezegen çapında yerçekimi değişimi yapamaz.",
    resim:"https://s13.gifyu.com/images/bIqUc.png"
  },
  {
    isim:"🩸 Kan Demirciliği",
    seviye:"Tehlikeli Yakın Savaş Seviyesi",
    aciklama:"Kullanıcı kendi kanını sertleştirerek silah, zincir ve zırh benzeri yapılar oluşturabilir.",
    limit:"Maksimumda bina seviyesinde yıkım yaratabilir. Fazla kullanımda kendi kan kaybı yüzünden ciddi şekilde zayıflar.",
    resim:"https://s13.gifyu.com/images/bIqUV.png"
  },
  {
    isim:"☠️ Gölge Geçidi",
    seviye:"Suikast / Gizlilik Seviyesi",
    aciklama:"Kullanıcı karanlık alanlarda gölgeler arasında hareket edebilir ve gölgeden saldırılar oluşturabilir.",
    limit:"En fazla bir bina kompleksi içinde etkili olur. Açık ve parlak ışıklı alanlarda gücü ciddi şekilde düşer.",
    resim:"https://s13.gifyu.com/images/bIqUf.jpg"
  },
  {
    isim:"🌀 Kısa Mesafe Işınlanma",
    seviye:"Taktiksel Üstünlük Seviyesi",
    aciklama:"Kullanıcı görüş alanındaki noktalara anlık olarak yer değiştirebilir.",
    limit:"Tek ışınlanmada en fazla birkaç yüz metre hareket edebilir. Görmediği veya bilmediği yerlere ışınlanamaz.",
    resim:"https://s13.gifyu.com/images/bIqUD.webp"
  },
  {
    isim:"🐉 Ejderha Uyanışı",
    seviye:"Küçük Kasaba Seviyesi",
    aciklama:"Kullanıcı yarı-ejderha formuna geçerek fiziksel güç, sert deri, kanat ve enerji nefesi kazanır.",
    limit:"Maksimum gücüyle küçük bir kasabayı ağır hasara uğratabilir. Büyük şehirleri tek başına yok edecek seviyede değildir.",
    resim:"https://s13.gifyu.com/images/bIqUO.jpg"
  }
];

function gucVer(){
    const guc = gucler[Math.floor(Math.random() * gucler.length)];
    const sonuc = document.getElementById("sonuc");

    sonuc.style.display = "block";

    sonuc.innerHTML = `
        <img src="${guc.resim}" class="guc-resim">

        <div class="guc-adi">${guc.isim}</div>

        <div class="info"><span class="label">Seviye:</span> ${guc.seviye}</div>
        <div class="info"><span class="label">Açıklama:</span> ${guc.aciklama}</div>
        <div class="info"><span class="label">Limit:</span> ${guc.limit}</div>
    `;
}
</script>

</body>
</html>
